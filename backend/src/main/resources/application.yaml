spring:
  config:
    import: optional:file:.env[.properties]
  main:
    banner-mode: "off"
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:aws-1-ap-southeast-1.pooler.supabase.com}:${POSTGRES_PORT:6543}/${POSTGRES_DB:test1}?prepareThreshold=0
    username: ${POSTGRES_USER:postgres.xhuvxyfehnsxnwljwtwq}
    password: ${POSTGRES_PASSWORD:Matkhau@1234qwer!}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true

  data:
    redis:
      host: ${REDIS_HOST:redis-18097.c276.us-east-1-2.ec2.cloud.redislabs.com}
      port: ${REDIS_PORT:18097}
      password: ${REDIS_PASSWORD:VFzqHirkG4WP7UzBFTI5Vwbqj0mUHo1F}

  security:
    oauth2:
      client:
        registration:
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID}
            client-secret: ${MICROSOFT_CLIENT_SECRET}
            redirect-uri: ${OAUTH2_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            scope:
              - openid
              - email
              - profile
              - User.Read
            authorization-grant-type: authorization_code
            client-name: Microsoft
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub

  app:
    oauth2:
      redirect:
        url: ${OAUTH2_REDIRECT_URL:http://localhost:3000/oauth-success}

jwt:
  secret: ${JWT_SECRET:VGhpc0lzQURldlNlY3JldEtleUZvckpXVFNpZ25pbmdPbmx5ISE=}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

server:
  servlet:
    context-path: /api
  port: 8081
  forward-headers-strategy: framework

logging:
  level:
    root: info

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

