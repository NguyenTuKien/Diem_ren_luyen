spring:
  config:
    import: optional:file:.env[.properties]
  main:
    banner-mode: "off"
    time-zone: Asia/Ho_Chi_Minh
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?prepareThreshold=0
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME_MS:900000}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT_MS:600000}
      keepalive-time: ${DB_HIKARI_KEEPALIVE_TIME_MS:120000}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_HIKARI_VALIDATION_TIMEOUT_MS:5000}
      minimum-idle: ${DB_HIKARI_MIN_IDLE:2}
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
    properties:
      hibernate.jdbc.time_zone: Asia/Ho_Chi_Minh

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  security:
    oauth2:
      client:
        registration:
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID}
            client-secret: ${MICROSOFT_CLIENT_SECRET}
            redirect-uri: ${OAUTH2_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            scope:
              - openid
              - email
              - profile
              - User.Read
            authorization-grant-type: authorization_code
            client-name: Microsoft
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub

  app:
    oauth2:
      redirect:
        url: ${OAUTH2_REDIRECT_URL:http://localhost:3000/oauth-success}

jwt:
  secret: ${JWT_SECRET:VGhpc0lzQURldlNlY3JldEtleUZvckpXVFNpZ25pbmdPbmx5ISE=}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

server:
  servlet:
    context-path: /api
  port: 8080
  forward-headers-strategy: framework

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

logging:
  level:
    root: warn
    ct01.unipoint.backend: info

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

