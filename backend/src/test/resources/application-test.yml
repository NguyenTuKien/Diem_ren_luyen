spring:
  datasource:
    # Thêm MODE=PostgreSQL để H2 hỗ trợ kiểu JSONB
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  data:
    redis:
      # Fix cứng port và host cho môi trường test để tránh lỗi NumberFormatException
      host: localhost
      port: 6379