apiVersion: v1
kind: ConfigMap
metadata:
  name: '{{ include "helm.fullname" . }}-configmap'
  labels:
    {{- include "helm.labels" . | nindent 4 }}
data:
  DB_HOST: "{{ .Values.database.name }}"
  DB_PORT: "{{ .Values.database.service.port }}"
  POSTGRES_DB: "{{ .Values.database.environment.POSTGRES_DB }}"
  POSTGRES_USER: "{{ .Values.database.environment.POSTGRES_USER }}"
  CORS_ALLOWED_ORIGINS: "{{ .Values.backend.environment.COR_ALLOWED_ORIGINS }}"