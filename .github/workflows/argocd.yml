name: Update GitOps Config Repo
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag của Docker Image mới (VD: abc123x)'
        required: true

jobs:
  update-config-repo:
    runs-on: ubuntu-latest
    steps:
      # 1. Kéo (Clone) Repository chứa Config (Helm values) về máy ảo của GitHub
      - name: Checkout Config Repository
        uses: actions/checkout@v4
        with:
          # THAY ĐỔI: Tên Repo chứa cấu hình Helm của bạn
          repository: NguyenTuKien/TTCS-Config-Repo
          # Bắt buộc phải dùng PAT (Personal Access Token) để có quyền push sang repo khác
          token: ${{ secrets.GITOPS_PAT_TOKEN }}
          # Tên nhánh của repo config muốn update (VD: main)
          ref: main

      # 2. Cấu hình danh tính Git để thực hiện commit
      - name: Setup Git Identity
        run: |
          git config --global user.name "github-actions-gitops[bot]"
          git config --global user.email "github-actions-gitops[bot]@users.noreply.github.com"

      # 3. Sử dụng lệnh sed để tìm và thay thế tag trong file values-stag.yaml
      - name: Update Image Tag in Helm Values
        env:
          NEW_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          echo "Bắt đầu cập nhật tag mới: $NEW_TAG"
          
          # Đảm bảo đường dẫn này khớp với vị trí file trong Repo Config của bạn
          FILE_PATH="helm-values/values-stag.yaml"
          
          # Lệnh sed tìm dòng "tag: <bất kỳ>" và thay bằng "tag: <NEW_TAG>"
          # regex 's/tag: .*/tag: abc123x/g'
          sed -i -E "s/tag: .+/tag: ${NEW_TAG}/g" $FILE_PATH
          
          echo "Nội dung file sau khi sửa:"
          cat $FILE_PATH | grep "tag:"

      # 4. Commit và Push thay đổi ngược lại lên Repo Config
      - name: Commit and Push to Config Repo
        run: |
          git add helm-values/values-stag.yaml
          # Nếu file không có thay đổi (trùng tag cũ), lệnh commit sẽ báo lỗi. 
          # Thêm '|| true' để pipeline không bị đỏ.
          git commit -m "Deploy: Update backend image tag to ${{ github.event.inputs.image_tag }}" || true
          git push origin main