name: CI pipeline for unipoint

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  statuses: write

jobs:
  unit_test_job:
    name: Run Unit Tests and Generate Coverage
    runs-on: ubuntu-latest

    # 1. TẠO DATABASE ẢO TRÊN GITHUB ACTIONS
    services:
      postgres:
        image: postgres:15 # Hoặc phiên bản PG bạn đang dùng
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Run Unit Tests with Maven
        working-directory: ./backend
        # 2. BƠM BIẾN MÔI TRƯỜNG VÀO CHO SPRING BOOT KẾT NỐI
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          JWT_SECRET: "VGhpc0lzQURldlNlY3JldEtleUZvckpXVFNpZ25pbmdPbmx5ISE=" # Thêm nếu Security đòi hỏi
        # Gộp lệnh test và gen report cho an toàn
        run: mvn -B clean test jacoco:report
        
      - name: Calculate Coverage Percentage
        if: always()
        working-directory: ./backend
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            # Tính toán và đưa vào biến môi trường GITHUB_ENV
            COVERAGE=$(awk -F"," '{ instructions += $4 + $5; covered += $5 } END { printf "%.2f", 100*covered/instructions }' target/site/jacoco/jacoco.csv)
            echo "COVERAGE_PERCENTAGE=$COVERAGE" >> $GITHUB_ENV
          else
            echo "COVERAGE_PERCENTAGE=N/A" >> $GITHUB_ENV
          fi
        
      - name: Upload JaCoCo Coverage Report & Classes for Sonar
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: |
            backend/target/site/jacoco/
            backend/target/surefire-reports/
            backend/target/classes/
          retention-days: 7
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/TEST-*.xml
          
      - name: Test Report Summary
        if: always()
        run: |
          echo "## 📊 Báo cáo Test & Coverage" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Code Coverage** | **${{ env.COVERAGE_PERCENTAGE }}%** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Báo cáo JaCoCo đã được tải lên phần Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Kết quả Test (XML) đã được lưu lại" >> $GITHUB_STEP_SUMMARY

  tag_job:
    name: Calculate Docker Tag
    runs-on: ubuntu-latest 
    if: >
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    outputs:
      docker_tag: ${{ steps.calc_tag.outputs.tag }} 
    steps:
      - name: Tính toán Tag tự động
        id: calc_tag
        run: |
          if [[ "${{ github.ref }}" == 'refs/heads/main' ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == 'refs/heads/dev' ]]; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

  build_job:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest 
    needs: [unit_test_job, tag_job]  
    if: >
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      REGISTRY_IMAGE: ${{ vars.DOCKER_REGISTRY }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Backend
        run: |
          docker pull $REGISTRY_IMAGE/unipoint-backend:$TAG || true
          docker build --cache-from $REGISTRY_IMAGE/unipoint-backend:$TAG -t $REGISTRY_IMAGE/unipoint-backend:$TAG ./backend
          docker push $REGISTRY_IMAGE/unipoint-backend:$TAG

      - name: Build and Push Frontend
        run: |
          docker pull $REGISTRY_IMAGE/unipoint-frontend:$TAG || true
          docker build --cache-from $REGISTRY_IMAGE/unipoint-frontend:$TAG -t $REGISTRY_IMAGE/unipoint-frontend:$TAG ./frontend
          docker push $REGISTRY_IMAGE/unipoint-frontend:$TAG

      - name: Cleanup Docker System
        if: always() 
        run: docker system prune -af

  integration_test_job:
    name: Run Integration Tests on Staging Environment
    runs-on: ubuntu-latest
    needs: [unit_test_job, tag_job, build_job]  
    if: >
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      REGISTRY_IMAGE: ${{ vars.DOCKER_REGISTRY }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Environment Variables
        run: |
          if [ -z "${{ secrets.ENV_FILE }}" ]; then
            echo "ERROR: ENV_FILE secret is not set in GitHub"
            exit 1
          fi
          
          echo "${{ secrets.ENV_FILE }}" > .env
          
          echo "TAG=$TAG" >> .env
          echo "DOCKER_REGISTRY=$REGISTRY_IMAGE" >> .env

      - name: Start services with Docker Compose
        run: |
          docker compose pull
          docker compose up -d --no-build
          
      - name: Wait and Check Logs
        run: |
          sleep 20
          docker compose ps
          docker compose logs --tail=200 backend || true

      - name: Check Health and Accessibility
        run: |
          curl -f https://unipoint.ngtukien.id.vn || (echo "Frontend unreachable" && exit 1)

      - name: Cleanup Docker System
        if: always()
        run: |
          docker compose down --volumes --rmi local
          docker system prune -a -f

  code_quality_scan:
    name: Code Quality Scan with SonarCloud
    runs-on: ubuntu-latest
    needs: [unit_test_job]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 # Cần Java để chạy Maven
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download JaCoCo Report # Chỉ cần tải file XML báo cáo, không cần cả thư mục classes
        uses: actions/download-artifact@v4
        with:
          name: jacoco-coverage-report
          path: backend/target/site/jacoco/

      - name: Run SonarCloud Scan with Maven
        working-directory: ./backend
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  security_scan:
    name: Security Scan with Trivy
    runs-on: ubuntu-latest
    needs: [tag_job, build_job]
    if: >
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    continue-on-error: true  
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      REGISTRY_IMAGE: ${{ vars.DOCKER_REGISTRY }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Run Trivy vulnerability scanner - Filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          
      - name: Run Trivy vulnerability scanner - Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY_IMAGE }}/unipoint-backend:${{ env.TAG }}'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

  update_be_config_stag:
    name: Update Backend Config (Stag)
    needs: [tag_job, build_job, integration_test_job]
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/dev' ||
      startsWith(github.ref, 'refs/tags/')
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }} 
      BACKEND_REPO_CONFIG: ${{ vars.BACKEND_REPO_CONFIG }}
      
    steps:
      - name: Checkout Backend Config Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPO_CONFIG }}
          token: ${{ env.PAT_TOKEN }}
          path: backend-repo

      - name: Update Backend Tag for Staging
        run: |
          cd backend-repo
          TARGET_FILE="helm-values/values-stag.yaml"
          
          echo ">>> Deploying to STAG environment <<<"
          echo ">>> Updating file: $TARGET_FILE with tag: ${{ env.TAG }} <<<"
          
          yq -i '.backend.image.tag = strenv(TAG)' "$TARGET_FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "$TARGET_FILE"
          git commit -m "CD: Update backend stag image tag to ${{ env.TAG }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

  update_be_config_prod:
    name: Update Backend Config (Prod)
    needs: [tag_job, build_job, integration_test_job]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }} 
      BACKEND_REPO_CONFIG: ${{ vars.BACKEND_REPO_CONFIG }}
    steps:
      - name: Checkout Backend Config Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPO_CONFIG }}
          token: ${{ env.PAT_TOKEN }}
          path: backend-repo
      - name: Update Backend Tag for Production
        run: |
          cd backend-repo
          TARGET_FILE="helm-values/values-prod.yaml"
          
          echo ">>> Deploying to PROD environment <<<"
          echo ">>> Updating file: $TARGET_FILE with tag: ${{ env.TAG }} <<<"
          
          yq -i '.backend.image.tag = strenv(TAG)' "$TARGET_FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "$TARGET_FILE"
          git commit -m "CD: Update backend prod image tag to ${{ env.TAG }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main


  update_fe_config_stag:
    name: Update Frontend Config (Stag)
    needs: [tag_job, build_job, integration_test_job]
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/dev' ||
      startsWith(github.ref, 'refs/tags/')
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }} 
      FRONTEND_REPO_CONFIG: ${{ vars.FRONTEND_REPO_CONFIG }}
      
    steps:
      - name: Checkout Frontend Config Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPO_CONFIG }}
          token: ${{ env.PAT_TOKEN }}
          path: frontend-repo

      - name: Update Frontend Tag for Staging
        run: |
          cd frontend-repo
          TARGET_FILE="helm-values/values-stag.yaml"
          
          echo ">>> Deploying to STAG environment <<<"
          echo ">>> Updating file: $TARGET_FILE with tag: ${{ env.TAG }} <<<"
          
          yq -i '.frontend.image.tag = strenv(TAG)' "$TARGET_FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "$TARGET_FILE"
          git commit -m "CD: Update frontend stag image tag to ${{ env.TAG }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

  update_fe_config_prod:
    name: Update Frontend Config (Prod)
    needs: [tag_job, build_job, integration_test_job]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }} 
      FRONTEND_REPO_CONFIG: ${{ vars.FRONTEND_REPO_CONFIG }}
    steps:
      - name: Checkout Frontend Config Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPO_CONFIG }}
          token: ${{ env.PAT_TOKEN }}
          path: frontend-repo
      - name: Update Frontend Tag for Production
        run: |
          cd frontend-repo
          TARGET_FILE="helm-values/values-prod.yaml"
          
          echo ">>> Deploying to PROD environment <<<"
          echo ">>> Updating file: $TARGET_FILE with tag: ${{ env.TAG }} <<<"
          
          yq -i '.frontend.image.tag = strenv(TAG)' "$TARGET_FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "$TARGET_FILE"
          git commit -m "CD: Update frontend prod image tag to ${{ env.TAG }}" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main

  notify_success:
    name: Send Success Notification to Discord
    runs-on: ubuntu-latest
    needs: [ unit_test_job, tag_job, build_job, integration_test_job, code_quality_scan, security_scan, update_be_config_stag, update_be_config_prod, update_fe_config_stag, update_fe_config_prod ]
    # SỬA LẠI: Dùng always() để đảm bảo job luôn được xem xét chạy
    # Kiểm tra không có job nào thất bại (nhưng cho phép skipped)
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Send Discord Notification - Success
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"✅ **DEPLOY SUCCESS!** 🚀\\n**Project:** ${{ github.repository }}\\n**Branch:** ${{ github.ref_name }}\\n**User:** ${{ github.actor }}\\n**Status:** 🟢 Thành công\\n👉 [Xem Pipeline](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

  notify_fail:
    name: Send Failure Notification to Discord
    runs-on: ubuntu-latest
    needs: [ unit_test_job, tag_job, build_job, integration_test_job, code_quality_scan, security_scan, update_be_config_stag, update_be_config_prod, update_fe_config_stag, update_fe_config_prod ]
    # SỬA LẠI: Dùng always() và kiểm tra xem có ÍT NHẤT một job nào đó thất bại không
    if: |
      always() &&
      contains(needs.*.result, 'failure') &&
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - name: Send Discord Notification - Failed
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🚨 **PIPELINE FAILED!** 💥\\n**Project:** ${{ github.repository }}\\n**Branch:** ${{ github.ref_name }}\\n**User:** ${{ github.actor }}\\n**Status:** 🔴 Thất bại\\n👉 [Xem lỗi tại đây](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}