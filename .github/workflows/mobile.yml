name: Build Tauri Mobile App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ==========================================
  # 🤖 JOB 1: BUILD ANDROID (Chạy trên Ubuntu)
  # ==========================================
  build-android:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npx tauri android init
          npx tauri android build

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: app-android-apk
          path: frontend/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ==========================================
  # 🍎 JOB 2: BUILD IOS (Bắt buộc chạy trên macOS)
  # ==========================================
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Build iOS App (Simulator)
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'http://localhost:3000' }}
        run: |
          npx tauri ios init
          npx tauri ios build --target aarch64-sim -- --no-sign

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: app-ios-build
          path: frontend/src-tauri/gen/ios/build/Release-iphonesimulator/**/*.app